<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 灵敏度查找器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
        }
        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        #sidebar {
            width: 340px;
            background-color: #1e293b;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
            overflow-y: auto;
        }
        #canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222; 
            position: relative;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: crosshair;
            background-color: #222;
        }
        .stat-box {
            background-color: #334155;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            padding: 4px 0;
            border-bottom: 1px solid #475569;
        }
        .outlier-item {
            opacity: 0.5;
            text-decoration: line-through;
        }
        #version-tag {
            font-size: 10px;
            color: #64748b;
            font-family: monospace;
            margin-bottom: 4px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        
        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .input-group input {
            width: 100%;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="text-slate-200 font-sans">

<div id="app-container">
    <div id="sidebar">
        <div>
            <div id="version-tag">VERSION 1.1.1</div>
            <h1 class="text-xl font-bold text-white">CS2 灵敏度查找器</h1>
            <p class="text-[11px] text-slate-400">纯粹直觉与肌肉记忆测试</p>
        </div>

        <div class="space-y-1 bg-slate-800 p-2 rounded border border-slate-700">
            <label class="block text-xs font-medium text-slate-300">画面比例与分辨率</label>
            <div class="flex gap-2 text-sm mt-1">
                <select id="aspect-ratio" class="w-1/3 bg-slate-700 border border-slate-600 rounded p-1.5 text-white focus:outline-none focus:border-blue-500 cursor-pointer">
                    <option value="16/9">16:9</option>
                    <option value="16/10" selected>16:10</option>
                    <option value="4/3">4:3</option>
                </select>
                <div class="flex flex-1 items-center bg-slate-700 border border-slate-600 rounded px-1.5 focus-within:border-blue-500 transition-colors">
                    <input type="number" id="res-x" value="1920" class="w-full bg-transparent text-white text-center focus:outline-none" placeholder="宽度">
                    <span class="text-slate-400 px-1 text-xs">x</span>
                    <input type="number" id="res-y" value="1200" class="w-full bg-transparent text-slate-400 text-center focus:outline-none cursor-not-allowed" readonly tabindex="-1">
                </div>
            </div>
        </div>

        <div class="bg-slate-800 p-2 rounded border border-slate-700">
            <label class="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" id="blind-mode" class="w-4 h-4 rounded text-blue-600 bg-slate-700 border-slate-600 focus:ring-blue-500 focus:ring-offset-slate-800">
                <div class="flex flex-col">
                    <span class="text-xs font-medium text-slate-200">启用“盲甩”模式</span>
                    <span class="text-[10px] text-slate-400">鼠标一开始移动，目标立刻隐藏</span>
                </div>
            </label>
        </div>

        <div class="bg-slate-800 p-2 rounded border border-slate-700 space-y-2">
            <div class="flex items-center justify-between">
                <label class="text-[11px] text-slate-300">隐藏延迟 (ms)</label>
                <input type="number" id="blind-delay" value="0" min="0" step="10" class="w-16 bg-slate-700 border border-slate-600 rounded p-0.5 text-center text-xs text-white">
            </div>
            <div class="flex items-center justify-between">
                <label class="text-[11px] text-slate-300">触发阈值 (%)</label>
                <input type="number" id="blind-threshold" value="15" min="0" max="20" step="0.5" class="w-16 bg-slate-700 border border-slate-600 rounded p-0.5 text-center text-xs text-white">
            </div>
            <p class="text-[10px] text-slate-500">移动超过目标距离的 X% 后触发隐藏</p>
        </div>

        <div class="bg-slate-800 p-2 rounded border border-slate-700 mt-1">
            <label class="flex items-center gap-2 cursor-pointer select-none">
                <input type="checkbox" id="random-color" class="w-4 h-4 rounded text-blue-600 bg-slate-700 border-slate-600 focus:ring-blue-500 focus:ring-offset-slate-800" checked>
                <div class="flex flex-col">
                    <span class="text-xs font-medium text-slate-200">随机目标颜色 (护眼)</span>
                    <span class="text-[10px] text-slate-400">每次生成低饱和度的随机色彩</span>
                </div>
            </label>
        </div>

        <div class="space-y-1 bg-slate-800 p-2 rounded border border-slate-700 mt-1">
            <label class="block text-xs font-medium text-slate-300">开火后生成冷却 (ms)</label>
            <input type="number" id="spawn-delay" value="400" min="0" step="50" class="w-full bg-slate-700 border border-slate-600 rounded p-1 text-sm text-white focus:outline-none text-center">
            <p class="text-[10px] text-slate-400 mt-0.5">防止点击余震导致新目标立即隐藏</p>
        </div>

        <div class="space-y-1">
            <label class="block text-xs font-medium text-slate-300">当前游戏灵敏度 (Sens)</label>
            <input type="number" id="current-sens" step="0.01" value="1.50" class="w-full bg-slate-700 border border-slate-600 rounded p-1.5 text-sm text-white focus:outline-none text-center focus:border-blue-500" placeholder="Sens">
        </div>

        <div class="space-y-1 bg-slate-800 p-2 rounded border border-slate-700">
            <label class="block text-xs font-medium text-slate-300">水平生成距离 (屏幕宽度%)</label>
            <div class="input-group text-xs">
                <span class="text-slate-400">最小:</span>
                <input type="number" id="min-x-dist" value="2" min="0" max="45" class="bg-slate-700 border border-slate-600 rounded p-1 text-white text-center">
                <span class="text-slate-400">最大:</span>
                <input type="number" id="max-x-dist" value="12" min="5" max="50" class="bg-slate-700 border border-slate-600 rounded p-1 text-white text-center">
            </div>
        </div>

        <div class="space-y-1 bg-slate-800 p-2 rounded border border-slate-700">
            <label class="block text-xs font-medium text-slate-300">垂直高度差 (屏幕高度%) <br><span class="text-[10px] text-slate-500">负数偏上，正数偏下，0则水平</span></label>
            <div class="input-group text-xs">
                <span class="text-slate-400">范围:</span>
                <input type="number" id="min-y-dist" value="0" class="bg-slate-700 border border-slate-600 rounded p-1 text-white text-center">
                <span class="text-slate-400">至</span>
                <input type="number" id="max-y-dist" value="0" class="bg-slate-700 border border-slate-600 rounded p-1 text-white text-center">
            </div>
        </div>

        <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition-colors shadow-lg text-sm mt-1">
            点击开始测试 (锁定鼠标)
        </button>
        <p class="text-[10px] text-slate-400 text-center">按 ESC 键停止测试并解锁鼠标</p>

        <div class="stat-box my-1">
            <div class="text-xs text-slate-400">推荐灵敏度 (剔除失误后的平均值)</div>
            <div id="average-sens" class="text-2xl font-bold text-green-400 my-1">-</div>
            <div class="text-[10px] text-slate-400" id="valid-count">有效定位: 0 次</div>
            <button id="apply-btn" class="text-xs bg-slate-600 hover:bg-slate-500 px-3 py-1 rounded mt-2 hidden transition-colors w-full">
                应用此 Sens 继续
            </button>
        </div>

        <div class="space-y-2 flex-grow flex flex-col min-h-0">
            <div class="flex justify-between items-center">
                <label class="block text-xs font-medium">最近记录</label>
                <button id="clear-btn" class="text-[10px] text-red-400 hover:text-red-300">清空</button>
            </div>
            <div id="history-list" class="flex-grow overflow-y-auto pr-1 space-y-1">
                <div class="text-xs text-slate-500 text-center py-4">暂无数据</div>
            </div>
        </div>

        <div class="mt-2 pt-3 border-t border-slate-700 text-center shrink-0">
            <p class="text-xs text-slate-300 font-medium">作者: 恐龙爱吃蛋糕</p>
            <p class="text-[10px] text-slate-400 font-mono mt-0.5">QQ: 1443748470</p>
            <p class="text-[10px] text-slate-500 mt-1">基于 <a href="https://opensource.org/licenses/MIT" target="_blank" class="underline hover:text-slate-300">MIT 协议</a> 开源</p>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
        <div id="overlay-hint" class="absolute inset-0 flex items-center justify-center pointer-events-none text-white/40 text-2xl font-bold tracking-widest">
            点击左侧按钮开始
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    
    const aspectRatioSelect = document.getElementById('aspect-ratio');
    const resXInput = document.getElementById('res-x');
    const resYInput = document.getElementById('res-y');
    const blindModeCheckbox = document.getElementById('blind-mode');
    const blindDelayInput = document.getElementById('blind-delay');
    const blindThresholdInput = document.getElementById('blind-threshold');
    const randomColorCheckbox = document.getElementById('random-color');
    const spawnDelayInput = document.getElementById('spawn-delay');
    
    const currentSensInput = document.getElementById('current-sens');
    const historyList = document.getElementById('history-list');
    const averageSensDisplay = document.getElementById('average-sens');
    const validCountDisplay = document.getElementById('valid-count');
    const overlayHint = document.getElementById('overlay-hint');
    const applyBtn = document.getElementById('apply-btn');
    const clearBtn = document.getElementById('clear-btn');

    const minXInput = document.getElementById('min-x-dist');
    const maxXInput = document.getElementById('max-x-dist');
    const minYInput = document.getElementById('min-y-dist');
    const maxYInput = document.getElementById('max-y-dist');

    let isPlaying = false;
    let camera = { x: 0, y: 0 }; 
    let target = { x: 0, y: 0 }; 
    let pixelsPerDegree = 0; 
    let currentTargetColor = { fill: '#d97777', stroke: '#e69999' }; // 默认柔和偏红
    
    const M_YAW = 0.022; 
    let validSensData = []; 

    // 状态追踪
    let accumulatedMoveDist = 0;
    let blindStartTime = 0; 
    let targetRequiredDist = 0;
    let isWaitingForSpawn = false;

    function calculateResY() {
        const ratioStr = aspectRatioSelect.value;
        const [ratioW, ratioH] = ratioStr.split('/').map(Number);
        const x = parseInt(resXInput.value);
        
        if (!isNaN(x) && x > 0) {
            const y = Math.round((x / ratioW) * ratioH);
            resYInput.value = y;
        } else {
            resYInput.value = '';
        }
        if (!isPlaying) updateEngineParams();
    }

    aspectRatioSelect.addEventListener('change', calculateResY);
    resXInput.addEventListener('input', calculateResY);

    function updateEngineParams() {
        const w = parseInt(resXInput.value) || 1920;
        const h = parseInt(resYInput.value) || 1080;
        
        canvas.width = w;
        canvas.height = h;

        const aspectRatio = w / h;
        const rad = Math.PI / 180;
        const fov_v = 2 * Math.atan((3/4) * Math.tan(90 * rad / 2));
        const fov_h_rad = 2 * Math.atan(Math.tan(fov_v / 2) * aspectRatio);
        const fov_h_deg = fov_h_rad / rad;
        pixelsPerDegree = w / fov_h_deg;
    }

    function spawnTarget() {
        const w = canvas.width;
        const h = canvas.height;
        camera.x = 0;
        camera.y = 0;

        // 重置移动追踪
        accumulatedMoveDist = 0;
        blindStartTime = 0;

        const minXPct = Math.max(0, parseFloat(minXInput.value)) / 100;
        const maxXPct = Math.max(0, parseFloat(maxXInput.value)) / 100;
        const minYPct = parseFloat(minYInput.value) / 100;
        const maxYPct = parseFloat(maxYInput.value) / 100;

        const signX = Math.random() > 0.5 ? 1 : -1;
        const minXPixels = w * minXPct;
        const maxXPixels = w * maxXPct;
        const targetX = signX * (minXPixels + Math.random() * (maxXPixels - minXPixels));

        const minYPixels = h * minYPct;
        const maxYPixels = h * maxYPct;
        const targetY = minYPixels + Math.random() * (maxYPixels - minYPixels);

        target.x = targetX;
        target.y = targetY;
        
        targetRequiredDist = Math.sqrt(targetX * targetX + targetY * targetY);

        // 生成柔和的随机颜色 (护眼低饱和度)
        if (randomColorCheckbox.checked) {
            const hue = Math.floor(Math.random() * 360);
            currentTargetColor.fill = `hsl(${hue}, 45%, 60%)`;
            currentTargetColor.stroke = `hsl(${hue}, 45%, 75%)`;
        } else {
            currentTargetColor.fill = '#d97777';
            currentTargetColor.stroke = '#e69999';
        }
    }

    function calculateShot() {
        const sens = parseFloat(currentSensInput.value);
        if (isNaN(sens) || sens <= 0) return;

        const targetDist = Math.sqrt(target.x * target.x + target.y * target.y);
        const actualDist = Math.sqrt(camera.x * camera.x + camera.y * camera.y);

        if (actualDist < 10) { 
            spawnTarget();
            return;
        }

        const dotProduct = target.x * camera.x + target.y * camera.y;
        const cosTheta = dotProduct / (targetDist * actualDist);
        
        const isOvershot = actualDist > targetDist;
        const errorPct = Math.abs(actualDist - targetDist) / targetDist * 100;

        let isOutlier = false;
        if (cosTheta < 0.7 || errorPct > 45) {
            isOutlier = true;
        }

        const suggestedSens = sens * (targetDist / actualDist);

        addHistoryRecord(suggestedSens, isOvershot, errorPct, isOutlier);
        
        isWaitingForSpawn = true;
        const delay = parseInt(spawnDelayInput.value) || 0;
        setTimeout(() => {
            spawnTarget();
            isWaitingForSpawn = false;
        }, delay);
    }

    function addHistoryRecord(suggested, isOvershot, errorPct, isOutlier) {
        if (!isOutlier) {
            validSensData.push(suggested);
            
            const sum = validSensData.reduce((a, b) => a + b, 0);
            const average = sum / validSensData.length;
            averageSensDisplay.innerText = average.toFixed(3);
            validCountDisplay.innerText = `有效定位: ${validSensData.length} 次`;
            applyBtn.classList.remove('hidden');
        }

        if (historyList.innerHTML.includes('暂无数据')) {
            historyList.innerHTML = '';
        }

        const div = document.createElement('div');
        div.className = `history-item ${isOutlier ? 'outlier-item' : ''}`;
        
        const statusSpan = document.createElement('span');
        if (isOutlier) {
            statusSpan.className = 'text-slate-500';
            statusSpan.innerText = `失误 (不计入)`;
        } else if (errorPct < 5) {
            statusSpan.className = 'text-green-400';
            statusSpan.innerText = `精准 (${errorPct.toFixed(1)}%)`;
        } else if (isOvershot) {
            statusSpan.className = 'text-red-400';
            statusSpan.innerText = `偏长 (+${errorPct.toFixed(1)}%)`;
        } else {
            statusSpan.className = 'text-yellow-400';
            statusSpan.innerText = `偏短 (-${errorPct.toFixed(1)}%)`;
        }

        const sensSpan = document.createElement('span');
        sensSpan.className = 'text-white font-mono text-[11px]';
        sensSpan.innerText = `Sens: ${suggested.toFixed(3)}`;

        div.appendChild(statusSpan);
        div.appendChild(sensSpan);
        
        historyList.prepend(div); 
    }

    function gameLoop() {
        if (!isPlaying) return;

        const w = canvas.width;
        const h = canvas.height;
        const centerX = w / 2;
        const centerY = h / 2;

        ctx.fillStyle = '#222';
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        const gridSize = 100;
        const offsetX = -camera.x % gridSize;
        const offsetY = -camera.y % gridSize;

        ctx.beginPath();
        for (let x = offsetX - gridSize; x < w + gridSize; x += gridSize) {
            ctx.moveTo(x, 0); ctx.lineTo(x, h);
        }
        for (let y = offsetY - gridSize; y < h + gridSize; y += gridSize) {
            ctx.moveTo(0, y); ctx.lineTo(w, y);
        }
        ctx.stroke();

        // 核心渲染逻辑改动：盲甩计时判断
        const isBlindMode = blindModeCheckbox.checked;
        let shouldShowTarget = !isWaitingForSpawn;

        if (isBlindMode && blindStartTime > 0) {
            const delay = parseInt(blindDelayInput.value) || 0;
            if (Date.now() - blindStartTime >= delay) {
                shouldShowTarget = false;
            }
        }

        if (shouldShowTarget) {
            const screenTargetX = centerX + target.x - camera.x;
            const screenTargetY = centerY + target.y - camera.y;

            ctx.beginPath();
            ctx.arc(screenTargetX, screenTargetY, 12, 0, Math.PI * 2);
            ctx.fillStyle = currentTargetColor.fill;
            ctx.fill();
            ctx.strokeStyle = currentTargetColor.stroke;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.moveTo(centerX - 10, centerY);
        ctx.lineTo(centerX + 10, centerY);
        ctx.moveTo(centerX, centerY - 10);
        ctx.lineTo(centerX, centerY + 10);
        ctx.strokeStyle = '#4ade80';
        ctx.lineWidth = 2;
        ctx.stroke();

        requestAnimationFrame(gameLoop);
    }

    startBtn.addEventListener('click', () => {
        canvas.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
        if (document.pointerLockElement === canvas) {
            isPlaying = true;
            updateEngineParams();
            spawnTarget();
            startBtn.innerText = "测试中 (ESC退出)";
            startBtn.classList.replace('bg-blue-600', 'bg-green-600');
            startBtn.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
            overlayHint.style.display = 'none';
            gameLoop();
        } else {
            isPlaying = false;
            startBtn.innerText = "点击开始测试";
            startBtn.classList.replace('bg-green-600', 'bg-blue-600');
            startBtn.classList.replace('hover:bg-green-500', 'hover:bg-blue-500');
            overlayHint.style.display = 'flex';
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (!isPlaying) return;
        const sens = parseFloat(currentSensInput.value);
        if (isNaN(sens) || sens <= 0) return;

        const dx = e.movementX * sens * M_YAW * pixelsPerDegree;
        const dy = e.movementY * sens * M_YAW * pixelsPerDegree;

        // 盲甩阈值判断
        if (isPlaying && !isWaitingForSpawn && blindModeCheckbox.checked && blindStartTime === 0) {
            accumulatedMoveDist += Math.sqrt(dx * dx + dy * dy);
            const thresholdPct = parseFloat(blindThresholdInput.value) || 0;
            const thresholdPixels = targetRequiredDist * (thresholdPct / 100);
            
            if (accumulatedMoveDist > thresholdPixels) {
                blindStartTime = Date.now();
            }
        }

        camera.x += dx;
        camera.y += dy;
    });

    document.addEventListener('mousedown', (e) => {
        if (!isPlaying || isWaitingForSpawn) return;
        if (e.button === 0) calculateShot();
    });

    applyBtn.addEventListener('click', () => {
        const average = parseFloat(averageSensDisplay.innerText);
        if (!isNaN(average)) {
            currentSensInput.value = average.toFixed(3);
        }
    });

    clearBtn.addEventListener('click', () => {
        validSensData = [];
        historyList.innerHTML = '<div class="text-xs text-slate-500 text-center py-4">暂无数据</div>';
        averageSensDisplay.innerText = '-';
        validCountDisplay.innerText = '有效定位: 0 次';
        applyBtn.classList.add('hidden');
    });

    calculateResY();
    ctx.fillStyle = '#222';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
